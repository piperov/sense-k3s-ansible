---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ssl-hep
  namespace: servicex
spec:
  interval: 2h
  url: "https://ssl-hep.github.io/ssl-helm-charts/"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: servicex
  namespace: servicex
spec:
  interval: 1h
  chart:
    spec:
      chart: servicex
      version: "1.1.4"  # Uses stable helm package registry tracking 
      sourceRef:
        kind: HelmRepository
        name: ssl-hep
        namespace: servicex
  values:
    # 1. Instruct the chart to pull credentials from a dedicated secret
    gridCertSecret: "grid-certs-secret"
      # # Tell ServiceX to mount the Grid certificates injected by Ansible
      # gridCertSecret: "servicex-grid-certs"
    # Basic sizing configuration matching readthedocs guidelines
    replicas: 1
    # Corrected map structure for the ServiceX Rucio template engine
    didFinder:
      rucio:
        enabled: true
    # FIX: Re-route the authentication engine to use CMS instead of ATLAS
    x509Secrets:
      vomsOrg: "cms"
    # FIX: Point to correct CMS VOMS servers
      vomses: |
        "cms" "voms-cms-auth.cern.ch" "443" "/DC=ch/DC=cern/OU=computers/CN=cms-auth.cern.ch""cms"
    # FIX: Point the sub-chart dependencies to the correct legacy repositories
    minio:
      image:
        registry: docker.io
        repository: bitnamilegacy/minio

    rabbitmq:
      image:
        registry: docker.io
        repository: bitnamilegacy/rabbitmq
    # Exposed Ingress configuration for Traefik
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: servicex.local
          paths:
            - path: /
              pathType: ImplementationSpecific
