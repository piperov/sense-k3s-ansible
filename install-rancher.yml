---
- name: Install Helm, cert-manager, and Rancher
  hosts: first_master
  become: yes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Download Helm install script
      shell: curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
      args:
        creates: /tmp/get_helm.sh
        
    - name: Set permissions on Helm script
      file:
        path: /tmp/get_helm.sh
        mode: '0700'

    - name: Execute Helm install script
      command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Add Helm repositories
      shell: |
        helm repo add jetstack https://charts.jetstack.io
        helm repo add rancher-stable https://releases.rancher.com/server-charts/stable
        helm repo update

            - name: Install cert-manager
              shell: |
                helm upgrade --install cert-manager jetstack/cert-manager \
                  --namespace cert-manager \
                  --create-namespace \
                  --set crds.enabled=true

    - name: Install Rancher
      shell: |
        helm upgrade --install rancher rancher-stable/rancher \
          --namespace cattle-system \
          --create-namespace \
          --set hostname={{ rancher_hostname }} \
          --set replicas=3 \
          --set bootstrapPassword=admin
