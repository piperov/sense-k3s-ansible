---
- name: Prepare Local Workstation and Cluster for ServiceX
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vault-pipi.yml # Contains: vault_grid_cert, vault_grid_key, vault_grid_passphrase

  vars:
    kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/config_minipaf"
    github_repo_path: "{{ lookup('env', 'HOME') }}/sense-k3s-ansible"
    
    servicex_endpoint: "http://servicex.internal"
    k3s_node_ip: "192.168.1.165" 

  tasks:
    - name: Ensure Python3 pip is available
      ansible.builtin.package:
        name: python3-pip
        state: present
      become: true

    - name: Install ServiceX CLI tool locally
      ansible.builtin.pip:
        name: servicex-cli
        state: present
      tags: servicex-cli

    - name: Ensure minipaf namespace exists on cluster
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: minipaf
        state: present

    - name: Inject standard Grid credentials into the target secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: grid-certs-secret
            namespace: minipaf
          type: Opaque
          data:
            usercert.pem: "{{ vault_grid_cert | b64encode }}"
            userkey.pem: "{{ vault_grid_key | b64encode }}"
            passphrase: "{{ vault_grid_passphrase | b64encode }}"
        state: present

    - name: Add local DNS mapping for the ServiceX Dashboard Ingress
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ k3s_node_ip }} servicex.internal"
        state: present
      become: true

