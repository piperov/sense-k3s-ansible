name: Deploy k3s Cluster

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        # Assuming runner has VPN/connectivity to the 172.18.29.x IPs
        ssh-keyscan -H 172.18.29.30 172.18.29.31 172.18.29.32 >> ~/.ssh/known_hosts

    - name: Run Ansible ping
      run: ansible-playbook -i hosts.ini ping.yml
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"

    - name: Deploy k3s
      run: ansible-playbook -i hosts.ini install-k3s.yml
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
