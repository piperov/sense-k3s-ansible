---
- name: Setup Kube-VIP and Install k3s first master (cluster init)
  hosts: first_master
  become: yes
  tasks:
    - name: Create manifests directory
      file:
        path: /var/lib/rancher/k3s/server/manifests
        state: directory
        mode: '0700'

    - name: Download/Create kube-vip manifest
      copy:
        dest: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
        content: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: kube-vip
            namespace: kube-system
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            annotations:
              rbac.authorization.kubernetes.io/autoupdate: "true"
            name: system:kube-vip-role
          rules:
            - apiGroups: [""]
              resources: ["services", "services/status", "nodes", "endpoints"]
              verbs: ["list","get","watch", "update"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["list", "get", "watch", "update", "create"]
          ---
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          metadata:
            name: system:kube-vip-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: system:kube-vip-role
          subjects:
          - kind: ServiceAccount
            name: kube-vip
            namespace: kube-system
          ---
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            creationTimestamp: null
            name: kube-vip-ds
            namespace: kube-system
          spec:
            selector:
              matchLabels:
                name: kube-vip-ds
            template:
              metadata:
                creationTimestamp: null
                labels:
                  name: kube-vip-ds
              spec:
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                      - matchExpressions:
                        - key: node-role.kubernetes.io/master
                          operator: Exists
                      - matchExpressions:
                        - key: node-role.kubernetes.io/control-plane
                          operator: Exists
                containers:
                - args:
                  - manager
                  env:
                  - name: vip_arp
                    value: "true"
                  - name: port
                    value: "6443"
                  - name: vip_nodename
                    valueFrom:
                      fieldRef:
                        fieldPath: spec.nodeName
                  - name: vip_interface
                    value: "eth0"
                  - name: vip_cidr
                    value: "32"
                  - name: cp_enable
                    value: "true"
                  - name: cp_namespace
                    value: kube-system
                  - name: vip_ddns
                    value: "false"
                  - name: svc_enable
                    value: "true"
                  - name: vip_leaderelection
                    value: "true"
                  - name: vip_leaseduration
                    value: "5"
                  - name: vip_renewdeadline
                    value: "3"
                  - name: vip_retryperiod
                    value: "1"
                  - name: address
                    value: "172.18.29.29"
                  image: ghcr.io/kube-vip/kube-vip:v0.6.4
                  imagePullPolicy: Always
                  name: kube-vip
                  securityContext:
                    capabilities:
                      add:
                      - NET_ADMIN
                      - NET_RAW
                      - SYS_TIME
                hostNetwork: true
                serviceAccountName: kube-vip
                tolerations:
                - effect: NoSchedule
                  operator: Exists
                - effect: NoExecute
                  operator: Exists

    - name: Install k3s on first master
      shell: "curl -sfL https://get.k3s.io | sh -s - server --cluster-init --tls-san 172.18.29.29 --tls-san sense-k3s.cms.rcac.purdue.edu --disable servicelb"

    - name: Get k3s node token
      command: cat /var/lib/rancher/k3s/server/node-token
      register: node_token
      changed_when: false

    - name: Set k3s_token fact
      set_fact:
        k3s_token: "{{ node_token.stdout }}"

- name: Install k3s on additional masters
  hosts: additional_masters
  become: yes
  tasks:
    - name: Install k3s on additional masters
      shell: "curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['first_master'][0]]['ansible_host'] | default(groups['first_master'][0]) }}:6443 K3S_TOKEN={{ hostvars[groups['first_master'][0]]['k3s_token'] }} sh -s - server --tls-san 172.18.29.29 --tls-san sense-k3s.cms.rcac.purdue.edu --disable servicelb"
