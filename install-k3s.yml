---
- name: Install k3s master
  hosts: master
  become: yes
  tasks:
    - name: Install k3s on master
      shell: curl -sfL https://get.k3s.io | sh -s - server --cluster-init
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: Get k3s node token
      command: cat /var/lib/rancher/k3s/server/node-token
      register: node_token
      changed_when: false

    - name: Set k3s_token fact
      set_fact:
        k3s_token: "{{ node_token.stdout }}"

- name: Install k3s nodes
  hosts: node
  become: yes
  tasks:
    - name: Install k3s on nodes
      shell: "curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['master'][0]]['ansible_host'] | default(groups['master'][0]) }}:6443 K3S_TOKEN={{ hostvars[groups['master'][0]]['k3s_token'] }} sh -"
      args:
        creates: /etc/systemd/system/k3s-agent.service
